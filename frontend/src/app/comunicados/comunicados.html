<div class="container">
  <app-comunicados-form
    [comunicado]="comunicadoSelecionado"
    (criado)="loadComunicados()"
  ></app-comunicados-form>

  <h2>Comunicados</h2>
  <div class="filtros">
    <input type="text" placeholder="Buscar..." [(ngModel)]="search" />

    <input type="date" [(ngModel)]="dataFiltro" />

    <button (click)="filtrar()">Filtrar</button>
    <button (click)="limparFiltro()">Limpar</button>
  </div>
  @for (c of comunicados; track c.id) {
    <div class="card">
      <h3>{{ c.titulo }}</h3>
      <p>{{ c.descricao }}</p>
      <small>{{ c.data }}</small>

      <button (click)="deletar(c.id)">Deletar</button>
      <button (click)="editar(c)">Editar</button>
    </div>
  }
</div>
