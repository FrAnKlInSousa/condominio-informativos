<div class="container">
  <app-comunicados-form
    [comunicado]="comunicadoSelecionado"
    (criado)="loadComunicados()"
  ></app-comunicados-form>

  <h2>Comunicados</h2>

  @for (c of comunicados; track c.id) {
    <div class="card">
      <h3>{{ c.titulo }}</h3>
      <p>{{ c.descricao }}</p>
      <small>{{ c.data }}</small>

      <button (click)="deletar(c.id)">Deletar</button>
      <button (click)="editar(c)">Editar</button>
    </div>
  }
</div>
